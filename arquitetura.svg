<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#0a0e1a" rx="16"/>
  <text x="400" y="36" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">Arquitetura DevOps — AWS + GitHub Actions</text>

  <!-- Repo Terraform -->
  <rect x="60" y="58" width="210" height="68" rx="10" fill="#1a1a2e" stroke="#7c5cfc" stroke-width="1.5"/>
  <text x="165" y="84" text-anchor="middle" fill="#7c5cfc" font-size="13" font-weight="600">Repo: Terraform</text>
  <text x="165" y="102" text-anchor="middle" fill="#94a3b8" font-size="11">Infraestrutura (HCL)</text>
  <text x="165" y="118" text-anchor="middle" fill="#4a3a8a" font-size="10">workflow_dispatch</text>

  <!-- Repo App -->
  <rect x="530" y="58" width="210" height="68" rx="10" fill="#0a1a1a" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="635" y="84" text-anchor="middle" fill="#00d4aa" font-size="13" font-weight="600">Repo: App</text>
  <text x="635" y="102" text-anchor="middle" fill="#94a3b8" font-size="11">Codigo + Dockerfile</text>
  <text x="635" y="118" text-anchor="middle" fill="#0a3d30" font-size="10">push main</text>

  <line x1="165" y1="126" x2="165" y2="178" stroke="#7c5cfc" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="635" y1="126" x2="635" y2="178" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Pipeline Terraform -->
  <rect x="60" y="178" width="210" height="105" rx="10" fill="#1a1a2e" stroke="#7c5cfc" stroke-width="1.5"/>
  <text x="165" y="204" text-anchor="middle" fill="#7c5cfc" font-size="13" font-weight="600">GitHub Actions</text>
  <text x="165" y="221" text-anchor="middle" fill="#94a3b8" font-size="11">terraform CI/CD</text>
  <line x1="76" y1="230" x2="254" y2="230" stroke="#2a2a4e" stroke-width="1"/>
  <text x="165" y="245" text-anchor="middle" fill="#64748b" font-size="10">init - plan - apply</text>
  <text x="165" y="263" text-anchor="middle" fill="#3d3d5a" font-size="10">SSH Key secret + chmod 400</text>

  <!-- Pipeline Deploy -->
  <rect x="530" y="178" width="210" height="68" rx="10" fill="#0a1a1a" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="635" y="204" text-anchor="middle" fill="#00d4aa" font-size="13" font-weight="600">GitHub Actions</text>
  <text x="635" y="222" text-anchor="middle" fill="#94a3b8" font-size="11">deploy CI/CD</text>
  <text x="635" y="238" text-anchor="middle" fill="#64748b" font-size="10">build - push ECR - SSH deploy</text>

  <text x="165" y="298" text-anchor="middle" fill="#64748b" font-size="10">OIDC</text>
  <text x="635" y="260" text-anchor="middle" fill="#64748b" font-size="10">OIDC</text>

  <line x1="165" y1="283" x2="165" y2="350" stroke="#7c5cfc" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-purple)"/>
  <line x1="635" y1="246" x2="635" y2="350" stroke="#00d4aa" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-teal)"/>

  <!-- AWS Container -->
  <rect x="40" y="333" width="720" height="215" rx="14" fill="#0d1117" stroke="#3d2800" stroke-width="1.5" stroke-dasharray="6 3"/>
  <rect x="58" y="325" width="104" height="18" fill="#0a0e1a"/>
  <text x="110" y="338" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">AWS us-east-2</text>

  <!-- EC2 -->
  <rect x="65" y="352" width="175" height="75" rx="10" fill="#150d25" stroke="#7c5cfc" stroke-width="1.5"/>
  <text x="152" y="378" text-anchor="middle" fill="#7c5cfc" font-size="13" font-weight="600">EC2</text>
  <text x="152" y="396" text-anchor="middle" fill="#94a3b8" font-size="11">website-server</text>
  <text x="152" y="412" text-anchor="middle" fill="#64748b" font-size="10">t3.micro - porta 80</text>

  <!-- ECR -->
  <rect x="312" y="352" width="175" height="75" rx="10" fill="#051510" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="400" y="378" text-anchor="middle" fill="#00d4aa" font-size="13" font-weight="600">ECR</text>
  <text x="400" y="396" text-anchor="middle" fill="#94a3b8" font-size="11">site_prod</text>
  <text x="400" y="412" text-anchor="middle" fill="#64748b" font-size="10">Imagens Docker</text>

  <!-- S3 -->
  <rect x="558" y="352" width="175" height="75" rx="10" fill="#130f00" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="645" y="378" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">S3 Bucket</text>
  <text x="645" y="396" text-anchor="middle" fill="#94a3b8" font-size="11">terraform state</text>
  <text x="645" y="412" text-anchor="middle" fill="#64748b" font-size="10">Estado remoto</text>

  <!-- Docker inside EC2 -->
  <rect x="75" y="442" width="155" height="38" rx="8" fill="#051510" stroke="#00d4aa" stroke-width="1"/>
  <text x="152" y="458" text-anchor="middle" fill="#00d4aa" font-size="11" font-weight="600">Docker Container</text>
  <text x="152" y="473" text-anchor="middle" fill="#64748b" font-size="10">site-prod - nginx :80</text>

  <line x1="152" y1="427" x2="152" y2="442" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="312" y1="388" x2="240" y2="388" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="276" y="381" text-anchor="middle" fill="#64748b" font-size="10">docker pull</text>
  <line x1="635" y1="350" x2="487" y2="350" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <path d="M 210 232 Q 430 232 430 322 Q 430 342 558 342 L 558 352" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-amber)"/>

  <!-- Users -->
  <line x1="152" y1="480" x2="152" y2="520" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="77" y="520" width="150" height="38" rx="10" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="152" y="537" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="500">Usuarios</text>
  <text x="152" y="551" text-anchor="middle" fill="#64748b" font-size="10">http://IP-DA-EC2</text>

  <!-- Legend -->
  <rect x="490" y="492" width="10" height="10" rx="2" fill="#7c5cfc"/>
  <text x="506" y="502" fill="#64748b" font-size="11">Infraestrutura + SSH Key (Terraform)</text>
  <rect x="490" y="512" width="10" height="10" rx="2" fill="#00d4aa"/>
  <text x="506" y="522" fill="#64748b" font-size="11">Aplicacao (Deploy)</text>
  <rect x="490" y="532" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="506" y="542" fill="#64748b" font-size="11">Estado Terraform (S3)</text>

</svg>
